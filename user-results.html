<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Dashboard | WWW.TNCLASSROOM.COM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 10px; }
        .glass-header { background: rgba(30, 58, 138, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="antialiased min-h-screen">

    <div class="glass-header text-white p-6 shadow-lg sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black tracking-tighter uppercase">My Results</h1>
                <p class="text-[10px] text-cyan-300 font-bold tracking-widest">WWW.TNCLASSROOM.COM</p>
            </div>
            <button onclick="downloadMyResults()" id="downloadBtn" class="hidden bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-xl font-black text-xs transition shadow-lg flex items-center gap-2">
                📊 DOWNLOAD EXCEL
            </button>
        </div>
    </div>

    <div class="max-w-4xl mx-auto p-4 md:p-8">
        
        <div class="bg-white rounded-[2.5rem] p-8 shadow-xl border border-slate-100 mb-8">
            <h2 class="text-center text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mb-4">Verification</h2>
            <div class="flex flex-col md:flex-row gap-4">
                <input type="tel" id="searchMobile" maxlength="10" 
                    class="flex-grow p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition-all font-bold text-lg text-center tracking-widest" 
                    placeholder="ENTER 10 DIGIT MOBILE">
                <button onclick="fetchUserResults()" 
                    class="bg-[#1e3a8a] text-white px-10 py-5 rounded-2xl font-black shadow-lg active:scale-95 transition-all uppercase tracking-widest">
                    View My Scores
                </button>
            </div>
            <p id="statusMsg" class="text-center text-xs mt-4 font-bold text-slate-400 italic"></p>
        </div>

        <div id="resultsWrapper" class="hidden animate-in fade-in duration-500">
            <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 border-b border-slate-100">
                            <tr>
                                <th class="p-5 text-[10px] font-black uppercase text-slate-500 tracking-widest">Date & Time</th>
                                <th class="p-5 text-[10px] font-black uppercase text-slate-500 tracking-widest">Quiz Name / ID</th>
                                <th class="p-5 text-[10px] font-black uppercase text-slate-500 tracking-widest text-center">Final Score</th>
                            </tr>
                        </thead>
                        <tbody id="userResultsBody" class="divide-y divide-slate-50">
                            </tbody>
                    </table>
                </div>
            </div>
            <p class="text-center text-[9px] text-slate-400 font-bold uppercase mt-6 tracking-widest">Generated by TN Classroom Management System</p>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBW92t7GWAf6vIHdJ83n7Nz7Io3y2GArVw",
            authDomain: "tnclassroom-mcq-new.firebaseapp.com",
            projectId: "tnclassroom-mcq-new",
            storageBucket: "tnclassroom-mcq-new.firebasestorage.app",
            messagingSenderId: "808928665241",
            appId: "1:808928665241:web:5a8a9e3f4ee5b885c9a208",
            measurementId: "G-L059C061EY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let userData = [];

        window.fetchUserResults = async () => {
            const mobile = document.getElementById('searchMobile').value.trim();
            const status = document.getElementById('statusMsg');
            const wrapper = document.getElementById('resultsWrapper');
            const body = document.getElementById('userResultsBody');
            const dlBtn = document.getElementById('downloadBtn');

            if (mobile.length !== 10) return alert("Please enter a valid 10-digit mobile number.");

            status.innerText = "Searching database...";
            body.innerHTML = "";
            wrapper.classList.add('hidden');
            dlBtn.classList.add('hidden');

            try {
                // Query: Search for records matching this mobile number
                const q = query(
                    collection(db, "results"), 
                    where("mobile", "==", mobile),
                    orderBy("timestamp", "desc")
                );

                const querySnapshot = await getDocs(q);
                userData = querySnapshot.docs.map(doc => doc.data());

                if (userData.length === 0) {
                    status.innerText = "No results found for this number.";
                    return;
                }

                userData.forEach(item => {
                    const dt = item.timestamp?.toDate ? item.timestamp.toDate().toLocaleString() : "—";
                    const scoreColor = (item.score / item.total) >= 0.5 ? 'text-green-600' : 'text-red-500';
                    
                    const row = `
                        <tr class="hover:bg-blue-50 transition-colors">
                            <td class="p-5">
                                <p class="text-xs font-bold text-slate-700">${dt}</p>
                            </td>
                            <td class="p-5">
                                <p class="text-xs font-black text-[#1e3a8a] uppercase">${item.quizId || 'General Assessment'}</p>
                            </td>
                            <td class="p-5 text-center">
                                <div class="inline-block px-3 py-1 rounded-full bg-slate-100">
                                    <span class="text-lg font-black ${scoreColor}">${item.score}</span>
                                    <span class="text-[10px] font-bold text-slate-400">/${item.total}</span>
                                </div>
                            </td>
                        </tr>
                    `;
                    body.insertAdjacentHTML('beforeend', row);
                });

                status.innerText = `Found ${userData.length} record(s).`;
                wrapper.classList.remove('hidden');
                dlBtn.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                status.innerText = "Error fetching data. Ensure index is created.";
            }
        };

        window.downloadMyResults = () => {
            if (userData.length === 0) return;

            const excelData = userData.map(item => ({
                "Date": item.timestamp?.toDate ? item.timestamp.toDate().toLocaleString() : "N/A",
                "Quiz ID": item.quizId,
                "Marks Obtained": item.score,
                "Total Marks": item.total,
                "Percentage": ((item.score / item.total) * 100).toFixed(2) + "%"
            }));

            const worksheet = XLSX.utils.json_to_sheet(excelData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "My Scores");
            XLSX.writeFile(workbook, `My_Results_${document.getElementById('searchMobile').value}.xlsx`);
        };
    </script>
</body>
</html>
