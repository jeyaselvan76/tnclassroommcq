<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNSED MCQ Portal | WWW.TNCLASSROOM.COM</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- TAMIL FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          processEscapes: true
        },
        options: {
          skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
          ignoreHtmlClass: 'tamil-math'
        }
      };
    </script>

    <script id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>

        body{
            -webkit-tap-highlight-color: transparent;
            background:#ffffff;
            font-family:'Noto Sans Tamil','Segoe UI',sans-serif;
        }

        #q-text,
        .option-text,
        .preview-text{
            white-space:pre-wrap;
            word-wrap:break-word;
            line-height:1.8;
            font-family:'Noto Sans Tamil','Latha','Vijaya',sans-serif !important;
        }

        /* CLEAR TAMIL TEXT */
        .tamil-math{
            font-family:'Noto Sans Tamil','Latha','Vijaya',sans-serif !important;
            font-size:26px !important;
            font-weight:600 !important;
            line-height:1.8 !important;
            letter-spacing:0 !important;
            white-space:nowrap !important;
            display:inline-block !important;
            unicode-bidi:isolate !important;
            color:#1f2937;
        }

        /* BEAUTIFUL FRACTION */
        .fraction-box{
            display:inline-flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            vertical-align:middle;
            margin-right:8px;
        }

        .fraction-top{
            border-bottom:2px solid #374151;
            padding:0 10px 6px 10px;
            margin-bottom:4px;
        }

        .fraction-bottom{
            padding-top:2px;
        }

        mjx-utext{
            font-family:inherit !important;
            font-size:100% !important;
        }

        .option-selected{
            background-color:#bbf7d0 !important;
            border-color:#22c55e !important;
        }

        .glass-nav{
            background:rgba(255,255,255,0.95);
            backdrop-filter:blur(12px);
            border-top:1px solid #e5e7eb;
        }

        .palette-btn{
            width:38px;
            height:38px;
            display:flex;
            align-items:center;
            justify-content:center;
            border-radius:10px;
            font-size:13px;
            font-weight:800;
            transition:all 0.2s;
            border:2px solid transparent;
        }

        .p-unanswered{
            background-color:#f3f4f6;
            color:#9ca3af;
            border-color:#e5e7eb;
        }

        .p-answered{
            background-color:#22c55e;
            color:white;
        }

        .p-skipped{
            background-color:#f59e0b;
            color:white;
        }

        .p-current{
            border-color:#1e3a8a;
            background-color:white;
            color:#1e3a8a;
            box-shadow:0 0 0 2px #fff,0 0 0 4px #1e3a8a;
        }

    </style>
</head>

<body class="antialiased min-h-screen">

<div class="w-full py-2 bg-white text-center border-b border-gray-200 sticky top-0 z-50">
    <span class="text-[#1e3a8a] font-black text-xs tracking-widest uppercase">
        www.tnclassroom.com
    </span>
</div>

<!-- LOGIN -->
<div id="section-reg" class="flex items-center justify-center min-h-[90vh] p-4">

    <div class="w-full max-w-md bg-white rounded-[2.5rem] p-8 shadow-2xl border-t-4 border-[#1e3a8a]">

        <h2 class="text-2xl font-black text-[#1e3a8a] text-center mb-1 uppercase tracking-tighter">
            Login
        </h2>

        <p id="display-subject"
           class="text-center text-[#1e3a8a] font-bold opacity-80 mb-6 uppercase tracking-widest text-xs border-b border-blue-50 pb-2">
            Loading...
        </p>

        <div class="space-y-4">

            <input type="text" id="userName"
                   class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:border-[#1e3a8a]"
                   placeholder="Full Name">

            <input type="tel" id="userMobile" maxlength="10"
                   class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:border-[#1e3a8a]"
                   placeholder="Mobile">

            <select id="userDistrict"
                    class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none appearance-none cursor-pointer">
                <option value="">Select District</option>
            </select>

            <button onclick="startQuiz()"
                    class="w-full bg-[#1e3a8a] text-white py-4 rounded-2xl font-bold shadow-lg transform active:scale-95 transition-all">
                ENTER
            </button>

        </div>
    </div>
</div>

<!-- QUIZ -->
<div id="section-quiz" class="hidden min-h-screen p-4 pb-40 bg-white">

    <div class="w-full max-w-6xl mx-auto flex flex-col lg:flex-row gap-6 px-2 mb-8">

        <div class="flex-1 bg-gray-50 rounded-[2.5rem] lg:rounded-[3.5rem] p-6 lg:p-12 border border-gray-100 shadow-sm self-start">

            <h2 id="q-text"
                class="text-lg lg:text-xl font-bold text-gray-800 leading-tight">
            </h2>

        </div>

        <div id="options-list" class="flex-1 space-y-4"></div>

    </div>

</div>

<script>

const tnDistricts = [
"Ariyalur","Chengalpattu","Chennai","Coimbatore","Cuddalore",
"Dharmapuri","Dindigul","Erode","Kallakurichi","Kancheepuram",
"Kanniyakumari","Karur","Krishnagiri","Madurai","Mayiladuthurai",
"Nagapattinam","Namakkal","Nilgiris","Perambalur","Pudukkottai",
"Ramanathapuram","Ranipet","Salem","Sivagangai","Tenkasi",
"Thanjavur","Theni","Thoothukudi","Tiruchirappalli","Tirunelveli",
"Tirupathur","Tiruppur","Tiruvallur","Tiruvannamalai","Tiruvarur",
"Vellore","Viluppuram","Virudhunagar"
];

let questions = [];
let currentIdx = 0;
let answers = [];
let skipped = [];

function initPortal(){

    const distSelect = document.getElementById('userDistrict');

    if(distSelect && distSelect.options.length <= 1){

        tnDistricts.forEach(d=>{
            distSelect.add(new Option(d,d));
        });
    }

    /* SAMPLE QUESTION */
    questions = [
        {
            question:"சதவீதம் காண்க",
            options:[
                "\\text{கால வயதா}/\\text{அடைவை வயதா} × 100",
                "\\text{அடைவை வயதா}/\\text{கால வயதா} × 100",
                "\\text{நூற்றறிவிலே வயதா}/\\text{கால வயதா} × 100",
                "\\text{மன வயதா}/\\text{கால வயதா} × 100"
            ]
        }
    ];

    answers = new Array(questions.length).fill(null);

}

if(document.readyState==="loading"){
    document.addEventListener("DOMContentLoaded",initPortal);
}else{
    initPortal();
}

/* TAMIL FRACTION FIX */
function processText(text){

    text = text.replace(/\\text\{([^}]*)\}/g,function(match,tamilText){

        return `<span class="tamil-math">${tamilText}</span>`;

    });

    text = text.replace(
        /<span class="tamil-math">(.*?)<\/span>\s*\/\s*<span class="tamil-math">(.*?)<\/span>\s*×\s*100/g,

        `
        <span class="fraction-box">

            <span class="fraction-top tamil-math">$1</span>

            <span class="fraction-bottom tamil-math">$2</span>

        </span>

        <span class="tamil-math">× 100</span>
        `
    );

    return text;
}

function startQuiz(){

    document.getElementById('section-reg').classList.add('hidden');

    document.getElementById('section-quiz').classList.remove('hidden');

    showQuestion();
}

function showQuestion(){

    const q = questions[currentIdx];

    document.getElementById('q-text').innerHTML =
        processText(q.question);

    const list = document.getElementById('options-list');

    list.innerHTML = '';

    q.options.forEach((opt,i)=>{

        const btn = document.createElement('button');

        btn.className =
        `w-full p-6 flex items-start justify-start bg-white border-2 rounded-3xl text-left group border-gray-200`;

        btn.innerHTML = `

            <span class="w-10 h-10 flex-shrink-0 flex items-center justify-center bg-[#1e3a8a] text-white rounded-full text-sm font-black mr-5">
                ${['A','B','C','D'][i]}
            </span>

            <div class="flex-grow leading-loose">
                ${processText(opt)}
            </div>

        `;

        list.appendChild(btn);

    });

    if(window.MathJax && window.MathJax.typesetPromise){
        window.MathJax.typesetPromise();
    }
}

</script>

</body>
</html>
