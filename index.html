<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNSED MCQ Portal | WWW.TNCLASSROOM.COM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      processEscapes: true
    },
    options: {
      // This prevents MathJax from trying to "fix" Tamil text layout
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
      ignoreHtmlClass: 'tex2jax_ignore',
      processHtmlClass: 'tex2jax_process'
    }
  };
</script>

 <style>
        /* 1. Core Typography & Tamil Rendering Fixes */
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Forces Tamil text to stay together (Ligature Fix) */
        #q-text, .option-text, .preview-text { 
            white-space: pre-wrap; 
            text-align: left !important;
            word-wrap: break-word;
            line-height: 1.6;
            font-family: 'Segoe UI', 'Latha', 'Tamil Sangam MN', sans-serif !important;
        }

        /* Specifically targets distorted MathJax Tamil characters */
        mjx-utext {
            font-family: 'Segoe UI', 'Arial', sans-serif !important;
            font-style: normal !important;
            line-height: normal;
        }

        /* 2. Interactive Elements */
        .option-selected { 
            background-color: #bbf7d0 !important; 
            border-color: #22c55e !important; 
            transform: scale(1.01);
        }

        .glass-nav { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(229, 231, 235, 0.5);
        }

        /* 3. Question Palette (Navigation) */
        .palette-btn { 
            width: 38px; 
            height: 38px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 10px; 
            font-size: 13px; 
            font-weight: 800; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 2px solid transparent; 
        }
        
        .p-unanswered { background-color: #f3f4f6; color: #9ca3af; border-color: #e5e7eb; }
        .p-answered { background-color: #22c55e; color: white; box-shadow: 0 2px 4px rgba(34, 197, 94, 0.2); }
        .p-skipped { background-color: #f59e0b; color: white; box-shadow: 0 2px 4px rgba(245, 158, 11, 0.2); }
        
        /* Current Active Question Highlight */
        .p-current { 
            border-color: #1e3a8a; 
            background-color: white;
            color: #1e3a8a;
            box-shadow: 0 0 0 2px #fff, 0 0 0 4px #1e3a8a; 
            transform: translateY(-2px);
        }

        /* 4. Scrollbars & Layout */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 10px; }

        #result-summary-list { 
            max-height: 450px; 
            overflow-y: auto; 
            padding-right: 8px; 
            scroll-behavior: smooth;
        }

        /* MathJax Loading protection */
        .mjx-chtml { outline: none !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased min-h-screen">

    <div class="w-full py-2 bg-white text-center border-b border-gray-200 sticky top-0 z-50">
        <span class="text-[#1e3a8a] font-black text-xs tracking-widest uppercase">www.tnclassroom.com</span>
    </div>

    <!-- LOGIN SECTION -->
    <div id="section-reg" class="flex items-center justify-center min-h-[90vh] p-4">
        <div class="w-full max-w-md bg-white rounded-[2.5rem] p-8 shadow-2xl border-t-4 border-[#1e3a8a]">
            <h2 class="text-2xl font-black text-[#1e3a8a] text-center mb-1 uppercase tracking-tighter">Login</h2>
            <p id="display-subject" class="text-center text-[#1e3a8a] font-bold opacity-80 mb-6 uppercase tracking-widest text-xs border-b border-blue-50 pb-2">Loading Subject...</p>
            <div class="space-y-4">
                <input type="text" id="userName" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:border-[#1e3a8a]" placeholder="Full Name">
                <input type="tel" id="userMobile" maxlength="10" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:border-[#1e3a8a]" placeholder="Mobile Number">
                <select id="userDistrict" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none appearance-none cursor-pointer">
                    <option value="">Select District</option>
                </select>
                <button onclick="startQuiz()" class="w-full bg-[#1e3a8a] text-white py-4 rounded-2xl font-bold shadow-lg transform active:scale-95 transition-all">ENTER QUIZ</button>
            </div>
        </div>
    </div>

    <!-- QUIZ INTERFACE - UPDATED TO WHITE BACKGROUND -->
    <div id="section-quiz" class="hidden min-h-screen p-4 pb-32 bg-white">
        <!-- Status Dashboard -->
        <div class="w-full max-w-6xl mx-auto grid grid-cols-4 gap-2 mb-6">
            <div class="bg-gray-100 p-3 rounded-2xl text-center border border-gray-200">
                <p class="text-[10px] text-gray-500 font-black uppercase">Total</p>
                <p id="stat-total" class="text-[#1e3a8a] font-black text-xl">0</p>
            </div>
            <div class="bg-green-50 p-3 rounded-2xl text-center border border-green-100">
                <p class="text-[10px] text-green-600 font-black uppercase">Answered</p>
                <p id="stat-answered" class="text-green-600 font-black text-xl">0</p>
            </div>
            <div class="bg-orange-50 p-3 rounded-2xl text-center border border-orange-100">
                <p class="text-[10px] text-orange-600 font-black uppercase">Skipped</p>
                <p id="stat-skipped" class="text-orange-600 font-black text-xl">0</p>
            </div>
            <div class="bg-gray-50 p-3 rounded-2xl text-center border border-gray-200">
                <p class="text-[10px] text-gray-400 font-black uppercase">Remaining</p>
                <p id="stat-left" class="text-gray-400 font-black text-xl">0</p>
            </div>
        </div>

        <div class="w-full max-w-6xl mx-auto flex flex-col lg:flex-row gap-6 px-2 mb-8">
            <div class="flex-1 bg-gray-50 rounded-[2.5rem] lg:rounded-[3.5rem] p-6 lg:p-12 border border-gray-100 shadow-sm self-start text-left">
                <div id="img-container" class="hidden mb-6 rounded-3xl overflow-hidden border-4 border-white shadow-md bg-white">
                    <img id="q-image" src="" class="w-full h-48 lg:h-72 object-contain">
                </div>
                <h2 id="q-text" class="text-lg lg:text-xl font-bold text-gray-800 leading-tight"></h2>
            </div>
            <div id="options-list" class="flex-1 space-y-3"></div>
        </div>

        <!-- Question Palette -->
        <div class="w-full max-w-6xl mx-auto bg-gray-50 p-6 rounded-[2.5rem] border border-gray-100">
            <p class="text-gray-400 text-[10px] font-black uppercase mb-4 tracking-widest">Question Navigator</p>
            <div id="question-palette" class="flex flex-wrap gap-2"></div>
        </div>

        <!-- Sticky Controls -->
        <div class="fixed bottom-0 left-0 right-0 p-4 flex justify-center z-40">
            <div class="w-full max-w-lg glass-nav rounded-[2rem] p-3 flex justify-between gap-2 shadow-2xl border border-gray-200">
                <button onclick="prevQuestion()" class="flex-1 py-4 bg-gray-100 text-gray-600 rounded-2xl font-bold text-xs uppercase hover:bg-gray-200 transition">Prev</button>
                <button onclick="skipQuestion()" class="flex-1 py-4 bg-orange-100 text-orange-600 rounded-2xl font-bold text-xs uppercase hover:bg-orange-200 transition border border-orange-200">Skip</button>
                <button id="btn-main" onclick="nextOrPreview()" class="flex-[2] py-4 bg-cyan-400 text-[#1e3a8a] rounded-2xl font-black text-xs shadow-lg uppercase hover:bg-cyan-300 transition">Next</button>
            </div>
        </div>
    </div>

    <!-- PREVIEW MODAL -->
    <div id="preview-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#1e3a8a]/95 backdrop-blur-sm">
        <div class="w-full max-w-2xl bg-white rounded-[2.5rem] p-8 h-[85vh] flex flex-col shadow-2xl">
            <h2 class="text-xl font-black text-[#1e3a8a] mb-4 uppercase">Review Answers</h2>
            <div id="preview-content" class="flex-grow overflow-y-auto space-y-4 mb-6 pr-2 custom-scrollbar"></div>
            <div class="flex gap-3">
                <button onclick="closePreview()" class="flex-1 py-4 border-2 border-gray-100 rounded-2xl font-bold text-gray-400">EDIT</button>
                <button onclick="goToFeedback()" class="flex-[2] py-4 bg-green-500 text-white rounded-2xl font-black shadow-lg">SUBMIT RESULTS</button>
            </div>
        </div>
    </div>

    <!-- FEEDBACK SECTION -->
    <div id="section-feedback" class="hidden flex items-center justify-center min-h-[90vh] p-4">
        <div class="w-full max-w-md bg-white rounded-[2.5rem] p-10 shadow-2xl text-center">
            <h2 class="text-2xl font-black text-gray-800 mb-6 uppercase">Feedback</h2>
            <textarea id="feedbackText" class="w-full p-5 bg-gray-50 border rounded-3xl h-32 mb-6 focus:border-[#1e3a8a] outline-none" placeholder="Share your suggestions..."></textarea>
            <button onclick="finalFinish()" class="w-full bg-[#1e3a8a] text-white py-5 rounded-3xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition">Confirm Submit</button>
        </div>
    </div>

    <!-- SUCCESS SECTION -->
    <div id="section-success" class="hidden flex flex-col items-center justify-center min-h-screen p-4 bg-gray-100">
        <div class="w-full max-w-3xl bg-white rounded-[3rem] p-8 lg:p-12 shadow-2xl text-center overflow-hidden">
            <div class="inline-block p-6 rounded-full bg-green-50 mb-4">
                <span id="display-score" class="text-5xl font-black text-green-600">0/0</span>
                <p class="text-[10px] font-bold text-green-700 uppercase mt-2 font-black tracking-widest">Final Score</p>
            </div>
            <h2 class="text-2xl font-black text-gray-800 mb-2 uppercase">Quiz Completed!</h2>
            <p id="performance-msg" class="text-sm text-gray-500 font-medium mb-6 px-4"></p>
            <div class="text-left mb-8">
                <h3 class="text-xs font-black text-[#1e3a8a] uppercase mb-4 border-b pb-2 tracking-widest">Review Your Answers</h3>
                <div id="result-summary-list" class="space-y-4 custom-scrollbar px-1"></div>
            </div>
            <div class="bg-gray-50 rounded-2xl p-4 mb-6 text-left border border-gray-100 flex justify-between items-center">
                <div><p id="success-name" class="text-sm font-bold text-gray-700"></p><p id="success-mobile" class="text-[10px] text-gray-400 font-bold uppercase"></p></div>
                <button onclick="location.reload()" class="bg-[#1e3a8a] text-white px-6 py-3 rounded-xl font-black text-xs uppercase shadow-md">Close Session</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBW92t7GWAf6vIHdJ83n7Nz7Io3y2GArVw",
            authDomain: "tnclassroom-mcq-new.firebaseapp.com",
            projectId: "tnclassroom-mcq-new",
            storageBucket: "tnclassroom-mcq-new.firebasestorage.app",
            messagingSenderId: "808928665241",
            appId: "1:808928665241:web:5a8a9e3f4ee5b885c9a208",
            measurementId: "G-L059C061EY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db; window.collection = collection; window.getDocs = getDocs; window.addDoc = addDoc; window.query = query; window.orderBy = orderBy;
    </script>

    <script>
        const tnDistricts = ["Ariyalur", "Chengalpattu", "Chennai", "Coimbatore", "Cuddalore", "Dharmapuri", "Dindigul", "Erode", "Kallakurichi", "Kancheepuram", "Kanniyakumari", "Karur", "Krishnagiri", "Madurai", "Mayiladuthurai", "Nagapattinam", "Namakkal", "Nilgiris", "Perambalur", "Pudukkottai", "Ramanathapuram", "Ranipet", "Salem", "Sivagangai", "Tenkasi", "Thanjavur", "Theni", "Thoothukudi", "Tiruchirappalli", "Tirunelveli", "Tirupathur", "Tiruppur", "Tiruvallur", "Tiruvannamalai", "Tiruvarur", "Vellore", "Viluppuram", "Virudhunagar"];
        let questions = [];
        let currentIdx = 0;
        let answers = []; 
        let skipped = []; 

        function initPortal() {
            const urlParams = new URLSearchParams(window.location.search);
            const quizId = urlParams.get('id');
            const displayId = quizId ? quizId.replace(/_/g, ' ') : "SSLC MATHS 2026";
            const subLabel = document.getElementById('display-subject');
            if(subLabel) subLabel.innerText = displayId;
            const distSelect = document.getElementById('userDistrict');
            if(distSelect && distSelect.options.length <= 1) { tnDistricts.forEach(d => distSelect.add(new Option(d, d))); }
        }

        if (document.readyState === "loading") { document.addEventListener("DOMContentLoaded", initPortal); } else { initPortal(); }

        async function startQuiz() {
            const name = document.getElementById('userName').value.trim();
            const mobile = document.getElementById('userMobile').value.trim();
            const dist = document.getElementById('userDistrict').value;
            if(!name || mobile.length !== 10 || !dist) return alert("Please enter Name, 10-digit Mobile, and District.");

            try {
                const urlParams = new URLSearchParams(window.location.search);
                const quizId = urlParams.get('id') || "SSLC_MATHS_2026"; 
                const qRef = window.collection(window.db, "quizzes", quizId, "questions");
                const qQuery = window.query(qRef, window.orderBy("qno"));
                const querySnapshot = await window.getDocs(qQuery);
                questions = querySnapshot.docs.map(doc => doc.data());
                if(questions.length === 0) return alert("Quiz not found.");
                
                answers = new Array(questions.length).fill(null);
                skipped = new Array(questions.length).fill(false);
                
                document.getElementById('section-reg').classList.add('hidden');
                document.getElementById('section-quiz').classList.remove('hidden');
                updatePalette();
                showQuestion();
            } catch (e) { alert("Database Error."); }
        }

        function updatePalette() {
            const palette = document.getElementById('question-palette');
            palette.innerHTML = '';
            
            let ansCount = 0;
            let skipCount = 0;

            questions.forEach((_, i) => {
                const btn = document.createElement('button');
                btn.innerText = i + 1;
                let statusClass = 'p-unanswered';
                
                if (answers[i] !== null) {
                    statusClass = 'p-answered';
                    ansCount++;
                } else if (skipped[i]) {
                    statusClass = 'p-skipped';
                    skipCount++;
                }

                btn.className = `palette-btn ${statusClass} ${i === currentIdx ? 'p-current' : ''}`;
                btn.onclick = () => { currentIdx = i; showQuestion(); };
                palette.appendChild(btn);
            });

            document.getElementById('stat-total').innerText = questions.length;
            document.getElementById('stat-answered').innerText = ansCount;
            document.getElementById('stat-skipped').innerText = skipCount;
            document.getElementById('stat-left').innerText = questions.length - ansCount - skipCount;
        }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('q-text').innerHTML = q.question;
            const qImg = document.getElementById('q-image');
            const imgCont = document.getElementById('img-container');
            if(q.imageUrl && q.imageUrl.trim() !== "") { qImg.src = q.imageUrl; imgCont.classList.remove('hidden'); } else { imgCont.classList.add('hidden'); }

            const list = document.getElementById('options-list');
            list.innerHTML = '';
            const labels = ['A', 'B', 'C', 'D'];
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = `w-full p-4 flex items-start justify-start bg-white border-2 rounded-2xl transition-all text-left group ${answers[currentIdx] === i ? 'option-selected border-green-500' : 'border-gray-200'}`;
                btn.innerHTML = `<span class="w-8 h-8 flex-shrink-0 flex items-center justify-center bg-[#1e3a8a] text-white rounded-full text-[10px] font-black mr-4 mt-0.5">${labels[i]}</span><div class="flex-grow text-left"><span class="block font-bold text-gray-700 option-text text-left">${opt}</span></div>`;
                btn.onclick = () => {
                    answers[currentIdx] = i;
                    skipped[currentIdx] = false;
                    updatePalette();
                    showQuestion();
                };
                list.appendChild(btn);
            });

            document.getElementById('btn-main').innerText = (currentIdx === questions.length - 1) ? "PREVIEW" : "NEXT";
            updatePalette();
            if (window.MathJax) MathJax.typesetPromise();
        }

        function skipQuestion() {
            if (answers[currentIdx] === null) skipped[currentIdx] = true;
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                showQuestion();
            } else {
                updatePalette();
            }
        }

        function nextOrPreview() {
            if(currentIdx < questions.length - 1) {
                currentIdx++;
                showQuestion();
            } else {
                showPreview();
            }
        }

        function prevQuestion() { if(currentIdx > 0) { currentIdx--; showQuestion(); } }

        function showPreview() {
            const cont = document.getElementById('preview-content');
            cont.innerHTML = '';
            questions.forEach((q, i) => {
                let selectionText = answers[i] !== null ? q.options[answers[i]] : (skipped[i] ? "SKIPPED" : "NOT ANSWERED");
                let colorClass = answers[i] !== null ? "text-[#1e3a8a]" : "text-orange-500";
                
                cont.innerHTML += `<div class="p-4 bg-gray-50 rounded-2xl border border-gray-100 text-left">
                    <p class="text-[10px] font-black text-gray-400 uppercase">Q${i+1}</p>
                    <p class="text-sm font-bold text-gray-700 mb-1 preview-text">${q.question}</p>
                    <p class="text-sm font-black preview-text ${colorClass}">Selection: ${selectionText}</p>
                </div>`;
            });
            document.getElementById('preview-modal').classList.remove('hidden');
            if (window.MathJax) MathJax.typesetPromise();
        }

        function closePreview() { document.getElementById('preview-modal').classList.add('hidden'); }
        function goToFeedback() { 
            document.getElementById('preview-modal').classList.add('hidden');
            document.getElementById('section-quiz').classList.add('hidden');
            document.getElementById('section-feedback').classList.remove('hidden'); 
        }

        async function finalFinish() {
            const submitBtn = event.target;
            submitBtn.disabled = true;
            submitBtn.innerText = "SUBMITTING...";

            let score = 0;
            const summaryList = document.getElementById('result-summary-list');
            summaryList.innerHTML = ''; 

            questions.forEach((q, i) => {
                const userChoice = parseInt(answers[i]);
                const correctChoice = parseInt(q.correctIndex);
                const isCorrect = userChoice === correctChoice;
                if (isCorrect) score++;

                const item = document.createElement('div');
                item.className = `p-4 rounded-2xl border-2 mb-3 ${isCorrect ? 'border-green-100 bg-green-50' : 'border-red-100 bg-red-50'}`;
                item.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-[10px] font-black uppercase ${isCorrect ? 'text-green-600' : 'text-red-600'}">Question ${i + 1}</span>
                    </div>
                    <p class="text-sm font-bold text-gray-800 mb-2 preview-text">${q.question}</p>
                    <div class="text-xs font-bold space-y-1">
                        <p>Your Answer: ${answers[i] !== null ? q.options[answers[i]] : 'None'}</p>
                        ${!isCorrect ? `<p class="text-green-700 border-t pt-1 mt-1">Correct Answer: ${q.options[correctChoice]}</p>` : ''}
                    </div>`;
                summaryList.appendChild(item);
            });

            const urlParams = new URLSearchParams(window.location.search);
            const res = {
                name: document.getElementById('userName').value,
                mobile: document.getElementById('userMobile').value,
                district: document.getElementById('userDistrict').value,
                feedback: document.getElementById('feedbackText').value,
                quizId: urlParams.get('id') || "SSLC_MATHS_2026",
                score, total: questions.length, timestamp: new Date()
            };

            try {
                await window.addDoc(window.collection(window.db, "results"), res);
                document.getElementById('display-score').innerText = `${score}/${questions.length}`;
                document.getElementById('success-name').innerText = res.name;
                document.getElementById('success-mobile').innerText = `ID: ${res.mobile}`;
                document.getElementById('section-feedback').classList.add('hidden');
                document.getElementById('section-success').classList.remove('hidden');
                window.scrollTo(0, 0);
            } catch (e) { alert("Submission error."); submitBtn.disabled = false; }
        }
    </script>
</body>
</html>
