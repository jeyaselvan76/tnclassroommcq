<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNSED MCQ Portal | WWW.TNCLASSROOM.COM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script>
      window.MathJax = {
        tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
        options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

   <style>
    body { 
        -webkit-tap-highlight-color: transparent; 
        font-family: sans-serif; 
        background-color: #f8fafc; 
    }
    
    /* THE ULTIMATE TAMIL FIX: Prevents characters from breaking/stretching */
    .tamil-fix, mjx-utext, mjx-c {
        font-family: 'Segoe UI', 'Latha', 'Tamil Sangam MN', sans-serif !important;
        font-style: normal !important;
        display: inline-block !important;
    }

    .stat-card { background: white; border: 1px solid #e2e8f0; border-radius: 1rem; padding: 10px; text-align: center; }
    .palette-btn { width: 35px; height: 35px; border-radius: 8px; font-weight: 800; font-size: 12px; transition: 0.2s; }
    .p-unanswered { background: #f1f5f9; color: #94a3b8; }
    .p-answered { background: #22c55e; color: white; }
    .p-skipped { background: #f59e0b; color: white; }
    .p-current { border: 3px solid #1e3a8a; background: white; color: #1e3a8a; }

    .option-selected { background-color: #f0fdf4 !important; border-color: #22c55e !important; box-shadow: 0 0 0 1px #22c55e; }
    .glass-nav { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-top: 1px solid #e2e8f0; }
    
    .quiz-footer {
        text-align: center; padding: 10px; font-size: 10px; font-weight: 900;
        letter-spacing: 2px; color: #1e3a8a; opacity: 0.5; text-transform: uppercase;
    }

    /* PDF Layout & Branding Fixes */
    #pdf-content { background: white !important; }
    
    #pdf-header-brand, #pdf-footer-brand { display: none; }
    
    #pdf-header-brand, #display-score, #user-details-pdf {
        page-break-after: avoid;
        break-after: avoid;
    }

    .correction-card {
        page-break-inside: avoid;
        break-inside: avoid;
        margin-bottom: 10px;
    }

    #pdf-watermark-main {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(-45deg);
        font-size: 5rem;
        color: rgba(0, 0, 0, 0.05) !important;
        font-weight: 900;
        z-index: 9999;
        white-space: nowrap;
        pointer-events: none;
    }
</style>
</head>
<body class="antialiased min-h-screen">

    <div class="w-full py-2 bg-white text-center border-b border-gray-100 sticky top-0 z-50">
        <span id="display-subject" class="text-[#1e3a8a] font-black text-[10px] tracking-widest uppercase">www.tnclassroom.com</span>
    </div>

    <div id="section-reg" class="flex items-center justify-center min-h-[85vh] p-4">
        <div class="w-full max-w-md bg-white rounded-[2.5rem] p-8 shadow-2xl border-t-8 border-[#1e3a8a]">
            <h2 class="text-2xl font-black text-[#1e3a8a] text-center mb-6 uppercase tracking-tighter">Login</h2>
            <div class="space-y-4">
                <input type="text" id="userName" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border border-transparent focus:border-blue-500" placeholder="Student Name">
                <input type="tel" id="userMobile" maxlength="10" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:border-[#1e3a8a]" placeholder="Mobile Number">
                <select id="userDistrict" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none appearance-none cursor-pointer">
                    <option value="">Select District</option>
                </select>
                <button onclick="startQuiz()" class="w-full bg-[#1e3a8a] text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition">START ASSESSMENT</button>
            </div>
        </div>
    </div>

    <div id="section-quiz" class="hidden min-h-screen p-4 pb-48 bg-white">
        <div class="max-w-4xl mx-auto grid grid-cols-4 gap-2 mb-6 text-slate-600">
            <div class="stat-card"><p class="text-[9px] font-bold uppercase">Total</p><p id="stat-total" class="font-black">0</p></div>
            <div class="stat-card"><p class="text-[9px] font-bold text-green-500 uppercase">Done</p><p id="stat-answered" class="font-black text-green-600">0</p></div>
            <div class="stat-card"><p class="text-[9px] font-bold text-orange-500 uppercase">Skip</p><p id="stat-skipped" class="font-black text-orange-600">0</p></div>
            <div class="stat-card"><p class="text-[9px] font-bold uppercase">Left</p><p id="stat-left" class="font-black">0</p></div>
        </div>

        <div class="max-w-4xl mx-auto space-y-6">
            <div class="bg-blue-50 rounded-[2.5rem] p-6 md:p-10 border border-blue-100">
                <div id="img-container" class="hidden mb-4"><img id="q-image" src="" class="max-h-64 mx-auto rounded-2xl shadow-sm bg-white"></div>
                <h2 id="q-text" class="text-lg md:text-xl font-bold text-gray-800 leading-relaxed"></h2>
            </div>
            <div id="options-list" class="space-y-3"></div>
            <div class="bg-gray-50 p-6 rounded-[2rem] border border-gray-100">
                <p class="text-[10px] font-black text-gray-400 uppercase mb-4 tracking-widest">Question Palette</p>
                <div id="question-palette" class="flex flex-wrap gap-2"></div>
            </div>
            <div class="quiz-footer">www.tnclassroom.com</div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 p-4 flex justify-center z-40">
            <div class="w-full max-w-lg glass-nav rounded-3xl p-3 flex justify-between gap-2 shadow-2xl">
                <button onclick="prevQuestion()" class="flex-1 py-4 bg-gray-100 text-gray-500 rounded-2xl font-bold text-xs">PREV</button>
                <button onclick="skipQuestion()" class="flex-1 py-4 bg-orange-100 text-orange-600 rounded-2xl font-bold text-xs">SKIP</button>
                <button id="btn-main" onclick="nextOrPreview()" class="flex-[2] py-4 bg-cyan-400 text-[#1e3a8a] rounded-2xl font-black text-xs uppercase">Next</button>
            </div>
        </div>
    </div>

    <div id="section-preview" class="hidden min-h-screen p-4 bg-gray-50 pb-32">
        <div class="max-w-2xl mx-auto">
            <h2 class="text-2xl font-black text-[#1e3a8a] mb-6 uppercase text-center">Review Answers</h2>
            <div id="summary-list" class="space-y-3 mb-6"></div>
            <div class="fixed bottom-0 left-0 right-0 p-6 bg-white border-t flex gap-3 z-50">
                <button onclick="backToQuiz()" class="flex-1 py-4 bg-gray-200 rounded-2xl font-black uppercase text-xs">Go Back</button>
                <button id="preview-submit-btn" onclick="goToFeedback()" class="flex-[2] py-4 rounded-2xl font-black text-white uppercase text-xs bg-blue-600 shadow-lg">Proceed to Submit</button>
            </div>
        </div>
    </div>

    <div id="section-feedback" class="hidden flex items-center justify-center min-h-[90vh] p-4">
        <div class="w-full max-w-md bg-white rounded-[2.5rem] p-10 shadow-2xl text-center">
            <h2 class="text-2xl font-black text-gray-800 mb-6 uppercase">Feedback</h2>
            <textarea id="feedbackText" class="w-full p-5 bg-gray-50 border rounded-3xl h-32 mb-6 focus:border-[#1e3a8a] outline-none" placeholder="Share your suggestions..."></textarea>
            <button id="final-confirm-btn" onclick="finalSubmitDirect()" class="w-full bg-[#1e3a8a] text-white py-5 rounded-3xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition">Confirm Submit</button>
        </div>
    </div>

    <div id="section-success" class="hidden min-h-screen p-4 bg-white">
        <div class="max-w-3xl mx-auto py-10">
            <div id="pdf-content" class="p-4">
                <div id="pdf-header-brand" class="text-center border-b-2 border-blue-900 pb-2 mb-4">
                    <p class="text-[10px] font-black text-blue-900 tracking-[0.3em] uppercase">www.tnclassroom.com</p>
                </div>
                
                <div id="pdf-watermark-main">WWW.TNCLASSROOM.COM</div>
                
                <div class="text-center mb-6">
                    <h2 class="text-6xl font-black text-green-600 mb-2" id="display-score">0/0</h2>
                    <p class="text-sm font-bold text-gray-500 uppercase tracking-widest">Assessment Completed</p>
                    <div id="user-details-pdf" class="mt-4 text-slate-700 font-bold text-sm bg-slate-50 p-4 rounded-xl border border-slate-200"></div>
                </div>
                
                <h3 class="font-black text-gray-800 mb-4 uppercase text-sm border-b pb-2">Correction Sheet</h3>
                <div id="correction-list" class="space-y-6 mb-10"></div>

                <div id="pdf-footer-brand" class="text-center border-t border-slate-200 pt-2 mt-8">
                    <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">System Generated Report — www.tnclassroom.com</p>
                </div>
            </div>
            
            <div class="flex flex-col gap-3">
                <button onclick="downloadCorrectionPDF()" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black shadow-lg">📊 DOWNLOAD CORRECTION PDF</button>
                <button onclick="location.reload()" class="w-full bg-gray-900 text-white p-5 rounded-2xl font-black shadow-xl">CLOSE SESSION</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBW92t7GWAf6vIHdJ83n7Nz7Io3y2GArVw",
            authDomain: "tnclassroom-mcq-new.firebaseapp.com",
            projectId: "tnclassroom-mcq-new",
            storageBucket: "tnclassroom-mcq-new.firebasestorage.app",
            messagingSenderId: "808928665241",
            appId: "1:808928665241:web:5a8a9e3f4ee5b885c9a208",
            measurementId: "G-L059C061EY"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db; window.collection = collection; window.getDocs = getDocs; window.addDoc = addDoc; window.query = query; window.orderBy = orderBy;
    </script>

    <script>
        const tnDistricts = ["Ariyalur", "Chengalpattu", "Chennai", "Coimbatore", "Cuddalore", "Dharmapuri", "Dindigul", "Erode", "Kallakurichi", "Kancheepuram", "Kanniyakumari", "Karur", "Krishnagiri", "Madurai", "Mayiladuthurai", "Nagapattinam", "Namakkal", "Nilgiris", "Perambalur", "Pudukkottai", "Ramanathapuram", "Ranipet", "Salem", "Sivagangai", "Tenkasi", "Thanjavur", "Theni", "Thoothukudi", "Tiruchirappalli", "Tirunelveli", "Tirupathur", "Tiruppur", "Tiruvallur", "Tiruvannamalai", "Tiruvarur", "Vellore", "Viluppuram", "Virudhunagar"];
        let questions = []; let currentIdx = 0; let answers = []; let skipped = [];

        function renderSafeText(text) {
            if (!text) return "";
            return text.replace(/\\text\{([^\}]+)\}/g, '<span class="tamil-fix">$1</span>');
        }

        document.addEventListener("DOMContentLoaded", () => {
            const quizId = new URLSearchParams(window.location.search).get('id') || "SSLC_MATHS_2026";
            const distSelect = document.getElementById('userDistrict');
            tnDistricts.forEach(d => distSelect.add(new Option(d, d)));
        });

        async function startQuiz() {
            const name = document.getElementById('userName').value.trim();
            const mobile = document.getElementById('userMobile').value.trim();
            const dist = document.getElementById('userDistrict').value;
            if(!name || mobile.length !== 10 || !dist) return alert("Invalid details.");

            try {
                const qId = new URLSearchParams(window.location.search).get('id') || "SSLC_MATHS_2026";
                const qSnap = await window.getDocs(window.query(window.collection(window.db, "quizzes", qId, "questions"), window.orderBy("qno")));
                questions = qSnap.docs.map(doc => doc.data());
                answers = new Array(questions.length).fill(null);
                skipped = new Array(questions.length).fill(false);
                document.getElementById('section-reg').classList.add('hidden');
                document.getElementById('section-quiz').classList.remove('hidden');
                showQuestion();
            } catch (e) { alert("Load Error."); }
        }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('q-text').innerHTML = renderSafeText(q.question);
            const qImg = document.getElementById('q-image');
            if(q.imageUrl) { qImg.src = q.imageUrl; document.getElementById('img-container').classList.remove('hidden'); }
            else { document.getElementById('img-container').classList.add('hidden'); }
            const list = document.getElementById('options-list');
            list.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = `w-full p-4 flex items-center bg-white border-2 rounded-2xl text-left transition ${answers[currentIdx] === i ? 'option-selected' : 'border-gray-100'}`;
                btn.innerHTML = `<span class="w-8 h-8 flex-shrink-0 flex items-center justify-center bg-[#1e3a8a] text-white rounded-full text-[10px] font-black mr-4">${['A','B','C','D'][i]}</span><div class="flex-grow font-bold text-gray-700">${renderSafeText(opt)}</div>`;
                btn.onclick = () => { answers[currentIdx] = i; skipped[currentIdx] = false; showQuestion(); };
                list.appendChild(btn);
            });
            document.getElementById('btn-main').innerText = (currentIdx === questions.length - 1) ? "Preview" : "Next";
            updatePalette();
            if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise();
        }

        function skipQuestion() {
            if (answers[currentIdx] === null) skipped[currentIdx] = true;
            if (currentIdx < questions.length - 1) { currentIdx++; showQuestion(); } else { showPreview(); }
        }

        function nextOrPreview() {
            if (currentIdx < questions.length - 1) { currentIdx++; showQuestion(); } else { showPreview(); }
        }

        function prevQuestion() { if(currentIdx > 0) { currentIdx--; showQuestion(); } }

        function updatePalette() {
            const palette = document.getElementById('question-palette');
            palette.innerHTML = '';
            let ans = 0; let skp = 0;
            questions.forEach((_, i) => {
                const btn = document.createElement('button');
                btn.innerText = i + 1;
                let s = 'p-unanswered';
                if (answers[i] !== null) { s = 'p-answered'; ans++; } else if (skipped[i]) { s = 'p-skipped'; skp++; }
                btn.className = `palette-btn ${s} ${i === currentIdx ? 'p-current' : ''}`;
                btn.onclick = () => { currentIdx = i; showQuestion(); };
                palette.appendChild(btn);
            });
            document.getElementById('stat-total').innerText = questions.length;
            document.getElementById('stat-answered').innerText = ans;
            document.getElementById('stat-skipped').innerText = skp;
            document.getElementById('stat-left').innerText = questions.length - ans - skp;
        }

        function showPreview() {
            document.getElementById('section-quiz').classList.add('hidden');
            document.getElementById('section-preview').classList.remove('hidden');
            const summary = document.getElementById('summary-list');
            summary.innerHTML = '';
            let allAnswered = true;
            questions.forEach((q, i) => {
                const isAns = answers[i] !== null;
                if(!isAns) allAnswered = false;
                const div = document.createElement('div');
                div.className = "p-4 bg-white rounded-xl border border-gray-200 flex justify-between items-center";
                div.innerHTML = `<div class="flex items-center gap-3"><span class="w-8 h-8 bg-slate-100 flex items-center justify-center rounded-lg font-black text-xs text-slate-500">${i+1}</span><span class="text-sm font-bold ${isAns ? 'text-green-600' : 'text-red-500'}">${isAns ? 'ANSWERED' : 'NOT ANSWERED'}</span></div><button onclick="backToSpecificQ(${i})" class="text-[10px] font-black text-blue-500 bg-blue-50 px-3 py-1 rounded-full uppercase">Edit</button>`;
                summary.appendChild(div);
            });
            document.getElementById('preview-submit-btn').innerText = allAnswered ? "Proceed to Submit" : "Answer all to submit";
            document.getElementById('preview-submit-btn').style.pointerEvents = allAnswered ? "auto" : "none";
            document.getElementById('preview-submit-btn').style.opacity = allAnswered ? "1" : "0.5";
        }

        function backToQuiz() { document.getElementById('section-preview').classList.add('hidden'); document.getElementById('section-quiz').classList.remove('hidden'); }
        function backToSpecificQ(idx) { currentIdx = idx; backToQuiz(); showQuestion(); }
        function goToFeedback() { document.getElementById('section-preview').classList.add('hidden'); document.getElementById('section-feedback').classList.remove('hidden'); }

       async function finalSubmitDirect() {
    const btn = document.getElementById('final-confirm-btn');
    btn.disabled = true; 
    btn.innerText = "SUBMITTING...";
    btn.classList.add('opacity-50');

    const name = document.getElementById('userName').value;
    const mobile = document.getElementById('userMobile').value;
    const dist = document.getElementById('userDistrict').value;
    const quizId = new URLSearchParams(window.location.search).get('id') || "SSLC_MATHS_2026";

    // 1. Prepare User Details for the PDF header
    document.getElementById('user-details-pdf').innerHTML = `
        <div class="grid grid-cols-2 gap-2 text-left">
            <p><span class="opacity-50">Name:</span> ${name}</p>
            <p><span class="opacity-50">Mobile:</span> ${mobile}</p>
            <p><span class="opacity-50">District:</span> ${dist}</p>
            <p><span class="opacity-50">Date:</span> ${new Date().toLocaleDateString()}</p>
        </div>
    `;

    let score = 0;
    const correction = document.getElementById('correction-list');
    correction.innerHTML = '';

    // 2. Generate Correction Cards
    answers.forEach((ans, i) => {
        const correctIdx = parseInt(questions[i].correctIndex);
        const isCorrect = (ans === correctIdx);
        if(isCorrect) score++;

        const card = document.createElement('div');
        // 'correction-card' class ensures the PDF doesn't cut the question in half
        card.className = `correction-card p-5 rounded-2xl border-l-8 mb-4 ${isCorrect ? 'border-green-500 bg-green-50' : 'border-red-500 bg-red-50'}`;
        
        card.innerHTML = `
            <p class="font-bold text-gray-800 mb-3">${renderSafeText(questions[i].question)}</p>
            <div class="text-sm space-y-1">
                <p><span class="font-bold opacity-60 uppercase text-[10px]">Your Answer:</span> 
                   <span class="${isCorrect ? 'text-green-700' : 'text-red-700'} font-black">${renderSafeText(questions[i].options[ans])}</span>
                </p>
                ${!isCorrect ? `
                <p><span class="font-bold opacity-60 uppercase text-[10px]">Correct Answer:</span> 
                   <span class="text-green-700 font-black">${renderSafeText(questions[i].options[correctIdx])}</span>
                </p>` : ''}
            </div>
        `;
        correction.appendChild(card);
    });

    // 3. Save to Firebase
    try {
        const resData = {
            name: name,
            mobile: mobile,
            district: dist,
            feedback: document.getElementById('feedbackText').value,
            score: score,
            total: questions.length,
            quizId: quizId,
            timestamp: new Date()
        };

        await window.addDoc(window.collection(window.db, "results"), resData);

        // 4. UI Transition to Success Screen
        document.getElementById('display-score').innerText = `${score}/${questions.length}`;
        document.getElementById('section-feedback').classList.add('hidden');
        document.getElementById('section-success').classList.remove('hidden');
        
        // Ensure MathJax renders formulas in the correction sheet
        if (window.MathJax && window.MathJax.typesetPromise) {
            window.MathJax.typesetPromise();
        }
        
        window.scrollTo(0, 0);

    } catch (e) {
        console.error("Submission Error: ", e);
        alert("Sync Error. Please check your connection.");
        btn.disabled = false;
        btn.innerText = "Confirm Submit";
        btn.classList.remove('opacity-50');
    }
}

   window.downloadCorrectionPDF = function() {
    const element = document.getElementById('pdf-content');
    const h = document.getElementById('pdf-header-brand');
    const f = document.getElementById('pdf-footer-brand');
    const w = document.getElementById('pdf-watermark-main');
    
    // Show branding
    h.style.display = 'block'; 
    f.style.display = 'block'; 
    w.style.display = 'block';

    const userName = document.getElementById('userName').value || "Student";
    const opt = {
        margin: [10, 10, 10, 10], 
        filename: `Correction_${userName}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { 
            scale: 2, 
            useCORS: true,
            scrollY: 0 
        },
        jsPDF: { 
            unit: 'mm', 
            format: 'a4', 
            orientation: 'portrait' 
        },
        // Changed to 'legacy' to prevent aggressive new pages
        pagebreak: { mode: 'legacy' } 
    };

    html2pdf().set(opt).from(element).save().then(() => {
        h.style.display = 'none'; 
        f.style.display = 'none'; 
        w.style.display = 'none';
    });
};
    </script>
</body>
</html>
