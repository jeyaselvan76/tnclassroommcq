<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Stay Tuned | TN Classroom</title>
    
    <style>
        /* CSS Reset for consistency across browsers */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2563eb;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem; /* Prevents touching edges on small screens */
        }

        .card {
            background: white;
            width: 100%;
            max-width: 480px; /* Limits width on desktop */
            padding: clamp(1.5rem, 5vw, 3rem); /* Dynamic padding based on screen size */
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        /* Fluid Typography */
        h1 {
            color: var(--text-main);
            font-size: clamp(1.5rem, 6vw, 2.25rem);
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        p {
            color: var(--text-muted);
            font-size: clamp(1rem, 4vw, 1.125rem);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* Animated Progress Bar instead of a simple spinner */
        .progress-container {
            width: 100%;
            background-color: #e2e8f0;
            border-radius: 999px;
            height: 8px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary-color);
            width: 30%;
            border-radius: 999px;
            animation: slide 2s infinite ease-in-out;
        }

        @keyframes slide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }

        .btn {
            display: inline-block;
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .btn:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        footer {
            margin-top: 2rem;
            font-size: 0.875rem;
            color: #94a3b8;
        }

        /* Adaptation for Dark Mode preferences */
        @media (prefers-color-scheme: dark) {
            body { background: #0f172a; }
            .card { background: #1e293b; color: white; }
            h1 { color: #f8fafc; }
            p { color: #94a3b8; }
            .progress-container { background-color: #334155; }
        }
    </style>
</head>
<body>

    <main class="card">
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        
        <h1>Wait for MCQ</h1>
        <p>We are currently uploading new materials. Please check back shortly for the latest updates.</p>
        
        <a href="https://www.tnclassroom.com" class="btn">Visit TN Classroom</a>

        <footer>
            &copy; <span id="year"></span> TN Classroom Updates
        </footer>
    </main>

    <script>
        // Dynamically update the year
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>

</body>
</html>
